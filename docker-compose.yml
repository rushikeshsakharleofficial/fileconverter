services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      TRUST_PROXY: 1
    expose:
      - "4000"
    volumes:
      - uploads-data:/app/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.scaling.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  uploads-data:
